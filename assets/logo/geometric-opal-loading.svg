<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Loading">
  <defs>
    <linearGradient id="opal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#9CF6D8"/>
      <stop offset="0.22" stop-color="#8FD3FF"/>
      <stop offset="0.45" stop-color="#C9B3FF"/>
      <stop offset="0.68" stop-color="#FF9ECF"/>
      <stop offset="0.85" stop-color="#FFC59E"/>
      <stop offset="1"    stop-color="#FFE3A8"/>
    </linearGradient>
  </defs>
  <!-- whole-icon fade -->
  <g fill="url(#opal)">
    <animate attributeName="opacity" values="0.18;1;0.18" keyTimes="0;0.5;1"
             dur="1.8s" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1" repeatCount="indefinite"/>

    <circle cx="100" cy="34" r="9"/>
    <path d="M96,73 L104,73 L101,166 L99,166 Z"/>

    <!-- top wings pivot one way, bottom the other, about (100,73) -->
    <g>
      <path d="M100,73 C134,54 170,48 186,50 C170,61 134,72 100,73 Z"/>
      <animateTransform attributeName="transform" type="rotate"
        values="-5 100 73; 4 100 73; -5 100 73" keyTimes="0;0.5;1"
        dur="1.8s" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M100,73 C66,54 30,48 14,50 C30,61 66,72 100,73 Z"/>
      <animateTransform attributeName="transform" type="rotate"
        values="5 100 73; -4 100 73; 5 100 73" keyTimes="0;0.5;1"
        dur="1.8s" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M100,73 C132,78 166,90 186,98 C170,86 134,73 100,73 Z"/>
      <animateTransform attributeName="transform" type="rotate"
        values="5 100 73; -4 100 73; 5 100 73" keyTimes="0;0.5;1"
        dur="1.8s" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1" repeatCount="indefinite"/>
    </g>
    <g>
      <path d="M100,73 C68,78 34,90 14,98 C30,86 66,73 100,73 Z"/>
      <animateTransform attributeName="transform" type="rotate"
        values="-5 100 73; 4 100 73; -5 100 73" keyTimes="0;0.5;1"
        dur="1.8s" calcMode="spline" keySplines=".4 0 .6 1;.4 0 .6 1" repeatCount="indefinite"/>
    </g>

    <circle cx="100" cy="73" r="4.5"/>
  </g>
</svg>
